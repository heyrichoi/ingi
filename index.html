<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>인기 도네 룰렛</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-color: #120422;
    --panel-color: #1e0a35;
    --accent-color: #d946ef;
    --accent-hover: #c026d3;
    --secondary-accent: #22d3ee;
    --danger-color: #ff0055;
    --success-color: #00ff9d;
    --text-color: #ffffff;
    --text-muted: #a78bfa;
    --border-color: #4c1d95;
    --neon-glow: 0 0 10px rgba(217, 70, 239, 0.6), 0 0 20px rgba(217, 70, 239, 0.4);
    --neon-text-glow: 0 0 5px rgba(255, 255, 255, 0.8), 0 0 10px rgba(217, 70, 239, 0.8);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    padding: 0;
    font-family: 'Jua', -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background-color: #0f0219;
    background-image: radial-gradient(circle at center, #2e1065 0%, #0f0219 100%);
    background-size: cover;
    background-attachment: fixed;
    color: var(--text-color);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
  }

  .app-container {
    width: 100%;
    max-width: 1400px;
    height: 100vh;
    display: grid;
    grid-template-columns: 450px 1fr;
    gap: 0;
    background: rgba(30, 10, 53, 0.7);
    box-shadow: 0 0 50px rgba(139, 92, 246, 0.2);
    border: 1px solid rgba(139, 92, 246, 0.3);
    backdrop-filter: blur(10px);
  }

  .roulette-section {
    background: rgba(20, 5, 35, 0.3);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-evenly;
    padding: 20px;
    border-right: 1px solid var(--border-color);
    position: relative;
    height: 100vh;
    overflow: hidden;
    z-index: 10;
  }

  .wheel-container {
    position: relative;
    width: 380px;
    height: 380px;
    max-width: 40vh;
    max-height: 40vh;
    flex-shrink: 0;
    filter: drop-shadow(0 0 30px rgba(167, 139, 250, 0.4));
  }

  .wheel-ring {
    position: absolute;
    inset: -15px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, #4c1d95, #d946ef, #4c1d95);
    box-shadow: 0 0 40px rgba(217, 70, 239, 0.5);
    z-index: 1;
    opacity: 0.8;
  }

  .wheel-rotator {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    position: relative;
    z-index: 2;
    transform-origin: center;
  }

  .wheel-rotator.spinning {
    animation: spin-infinite 0.08s linear infinite;
  }

  @keyframes spin-infinite {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .wheel {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    position: absolute;
    top: 0;
    left: 0;
    overflow: hidden;
    border: 6px solid #2e1065;
    box-shadow: inset 0 0 30px rgba(0,0,0,0.9);
  }

  .wheel-center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 60px;
    height: 60px;
    background: radial-gradient(circle, #fff 0%, #d946ef 100%);
    border-radius: 50%;
    z-index: 10;
    box-shadow: 0 0 20px rgba(217, 70, 239, 0.8);
    border: 3px solid #fff;
  }

  .pointer {
    position: absolute;
    top: -30px;
    left: 50%;
    transform: translateX(-50%);
    width: 40px;
    height: 50px;
    z-index: 20;
    filter: drop-shadow(0 0 5px #d946ef) drop-shadow(0 0 15px #d946ef);
  }

  .wheel-labels {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 5;
    border-radius: 50%;
    overflow: hidden;
  }

  .slice-label {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 50%;
    height: 0;
    transform-origin: 0% 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding-left: 40px;
    padding-right: 15px;
  }

  .slice-label span {
    display: block;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: #fff;
    font-weight: 800;
    text-shadow: 0 0 4px rgba(0,0,0,0.9);
    font-size: 16px;
    max-width: 100%;
    font-family: 'Jua', sans-serif;
  }

  .result-display {
    text-align: center;
    margin: 10px 0;
    height: 80px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    background: rgba(46, 16, 101, 0.4);
    padding: 10px 30px;
    border-radius: 16px;
    border: 1px solid rgba(217, 70, 239, 0.3);
    box-shadow: 0 0 20px rgba(217, 70, 239, 0.1) inset;
  }

  .result-label {
    font-size: 13px;
    color: var(--secondary-accent);
    margin-bottom: 4px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .result-value {
    font-size: 32px;
    font-weight: 900;
    color: #ffff00;
    text-shadow: 0 0 10px rgba(255, 255, 0, 0.6), 0 0 20px rgba(255, 255, 0, 0.4);
    letter-spacing: -0.5px;
  }

  .result-detail {
    font-size: 16px;
    color: var(--text-muted);
    font-weight: 600;
    margin-top: 4px;
    text-shadow: none;
  }

  .calc-container {
    width: 100%;
    max-width: 380px;
    background: rgba(30, 10, 50, 0.4);
    border: 1px solid var(--border-color);
    border-radius: 16px;
    padding: 20px;
    flex-shrink: 0;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }

  .calc-header {
    color: var(--secondary-accent);
    font-weight: 700;
    font-size: 15px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    text-shadow: 0 0 5px rgba(34, 211, 238, 0.5);
  }

  .calc-header svg {
    width: 18px;
    height: 18px;
    filter: drop-shadow(0 0 2px var(--secondary-accent));
  }

  .calc-input-group {
    display: flex;
    align-items: center;
    background: rgba(0, 0, 0, 0.4);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    padding: 0 12px;
    margin-bottom: 8px;
    transition: all 0.2s;
  }

  .calc-input-group:focus-within {
    border-color: var(--secondary-accent);
    box-shadow: 0 0 10px rgba(34, 211, 238, 0.2);
  }

  .calc-input-group input {
    flex: 1;
    background: transparent;
    border: none;
    color: white;
    padding: 12px 5px;
    font-size: 16px;
    text-align: right;
    outline: none;
    font-weight: 600;
    font-family: 'Jua', sans-serif;
  }

  .calc-input-group span {
    color: var(--text-muted);
    font-size: 13px;
    margin-left: 6px;
  }

  .calc-arrow {
    text-align: center;
    color: var(--text-muted);
    font-size: 11px;
    margin: 6px 0;
    font-weight: 500;
  }

  .calc-result-box {
    background: rgba(255, 255, 255, 0.05);
    border-radius: 12px;
    padding: 15px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.05);
  }

  .calc-stack {
    font-size: 28px;
    font-weight: 900;
    color: var(--success-color);
    text-shadow: 0 0 15px rgba(0, 255, 157, 0.4);
  }

  .calc-stack-label {
    font-size: 13px;
    color: var(--text-muted);
    margin-left: 2px;
  }

  .calc-sub-text {
    display: block;
    margin-top: 4px;
    font-size: 12px;
    color: var(--text-muted);
  }

  .calc-highlight {
    color: #e2e8f0;
    font-weight: 700;
  }

  .controls-section {
    display: flex;
    flex-direction: column;
    padding: 30px 40px;
    background: transparent;
    height: 100vh;
    overflow: hidden;
    position: relative;
  }

  .mascot-img {
    position: absolute;
    bottom: 0;
    right: 0;
    height: 60vh;
    width: auto;
    object-fit: contain;
    z-index: 0;
    pointer-events: none;
    opacity: 1;
    transition: opacity 0.25s ease, transform 0.25s ease;
    filter: drop-shadow(0 0 20px rgba(0,0,0,0.5));
  }

  .controls-header {
    display: flex;
    flex-direction: column;
    gap: 15px;
    margin-bottom: 24px;
    position: relative;
    z-index: 2;
    background: rgba(30, 10, 53, 0.5);
    backdrop-filter: blur(5px);
    padding: 25px 20px;
    border-radius: 20px;
    border: 1px solid var(--border-color);
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    align-items: center;
  }

  .header-logo-inline {
    height: 85px;
    width: auto;
    object-fit: contain;
    filter: drop-shadow(0 0 5px rgba(217, 70, 239, 0.5));
    margin-right: 30px;
  }

  @media (max-width: 1100px) {
    .header-logo-inline { display: none; }
  }

  .spin-btn {
    background: linear-gradient(90deg, #d946ef, #8b5cf6);
    color: white;
    border: none;
    padding: 0 20px;
    height: 60px;
    font-size: 22px;
    font-weight: 900;
    border-radius: 12px;
    cursor: pointer;
    box-shadow: 0 0 20px rgba(217, 70, 239, 0.4);
    transition: all 0.2s;
    width: 100%;
    text-transform: uppercase;
    letter-spacing: 1px;
    text-shadow: 0 2px 2px rgba(0,0,0,0.3);
    position: relative;
    overflow: hidden;
    font-family: 'Jua', sans-serif;
  }

  .spin-btn::after {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: linear-gradient(to bottom right, rgba(255,255,255,0.3), transparent, transparent);
    transform: rotate(45deg);
    transition: all 0.5s;
  }

  .spin-btn:hover::after { left: 100%; }
  .spin-btn.stop-mode {
    background: linear-gradient(90deg, #ff0055, #db2777);
    box-shadow: 0 0 20px rgba(255, 0, 85, 0.5);
  }
  .spin-btn:hover { transform: translateY(-2px); filter: brightness(1.2); }
  .spin-btn:active { transform: translateY(0); }
  .spin-btn:disabled { background: #475569; color: #94a3b8; box-shadow: none; cursor: not-allowed; transform: none; }

  .timer-container {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    justify-content: center;
    margin-bottom: 5px;
    flex-wrap: wrap;
  }

  .quick-timer-group {
    display: flex;
    gap: 8px;
  }

  .btn-quick {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border-color);
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 600;
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Jua', sans-serif;
  }

  .btn-quick:hover {
    background: rgba(255,255,255,0.1);
    color: white;
    box-shadow: 0 0 10px rgba(255,255,255,0.1);
  }

  .btn-quick:active {
    background: var(--accent-color);
    border-color: var(--accent-color);
    color: white;
  }

  .btn-quick.paused {
    background: rgba(255, 0, 85, 0.15);
    border-color: rgba(255, 0, 85, 0.45);
    color: #fff;
    box-shadow: 0 0 12px rgba(255, 0, 85, 0.25);
  }

  .timer-box {
    text-align: right;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
  }

  .timer-label {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 4px;
    font-weight: 600;
  }

  .timer-display {
    font-family: 'Jua', sans-serif;
    font-size: 42px;
    font-weight: 800;
    color: var(--secondary-accent);
    background: rgba(0,0,0,0.3);
    padding: 0 20px;
    height: 60px;
    line-height: 58px;
    border-radius: 12px;
    border: 1px solid var(--border-color);
    cursor: pointer;
    box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
    transition: all 0.2s;
    text-shadow: 0 0 10px rgba(34, 211, 238, 0.4);
  }

  .timer-display:hover { border-color: var(--secondary-accent); }

  .timer-display.urgent {
    color: var(--danger-color);
    text-shadow: 0 0 15px rgba(255, 0, 85, 0.6);
    border-color: var(--danger-color);
    animation: urgent-pulse 0.5s infinite alternate;
  }

  .timer-display.paused {
    color: #ffd966;
    border-color: #ffd966;
    text-shadow: 0 0 12px rgba(255, 217, 102, 0.45);
  }

  @keyframes urgent-pulse {
    0% { transform: scale(1); opacity: 1; text-shadow: 0 0 10px red; }
    100% { transform: scale(1.05); opacity: 0.8; text-shadow: 0 0 20px red, 0 0 40px red; }
  }

  .timer-edit-input {
    font-family: 'Jua', sans-serif;
    font-size: 36px;
    font-weight: 800;
    color: var(--secondary-accent);
    background: #181926;
    border: 1px solid var(--accent-color);
    width: 160px;
    height: 60px;
    padding: 0 10px;
    border-radius: 10px;
    text-align: center;
    display: none;
    outline: none;
  }

  .data-table-container {
    flex: 1;
    background: rgba(20, 5, 35, 0.4);
    border-radius: 16px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    border: 1px solid var(--border-color);
    position: relative;
    z-index: 1;
    backdrop-filter: blur(5px);
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
  }

  .table-header {
    display: grid;
    grid-template-columns: 70px 2fr 130px 100px;
    background: linear-gradient(90deg, rgba(76, 29, 149, 0.6), rgba(50, 10, 100, 0.6));
    color: #fff;
    font-weight: 700;
    padding: 10px 16px;
    font-size: 14px;
    align-items: center;
    text-align: center;
    border-bottom: 1px solid var(--border-color);
    text-shadow: 0 0 5px rgba(255,255,255,0.3);
  }

  .table-body {
    flex: 1;
    overflow-y: auto;
    padding-bottom: 60px;
  }

  .table-body::-webkit-scrollbar { width: 6px; }
  .table-body::-webkit-scrollbar-track { background: transparent; }
  .table-body::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
  .table-body::-webkit-scrollbar-thumb:hover { background: var(--accent-color); }

  .table-row {
    display: grid;
    grid-template-columns: 70px 2fr 130px 100px;
    padding: 6px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    align-items: center;
    transition: background 0.2s;
  }

  .table-row:hover { background: rgba(217, 70, 239, 0.1); }

  .cell-action {
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .btn-delete {
    background: rgba(239, 68, 68, 0.1);
    border: 1px solid rgba(239, 68, 68, 0.3);
    color: var(--danger-color);
    width: 24px;
    height: 24px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    transition: all 0.2s;
  }

  .btn-delete:hover {
    background: var(--danger-color);
    color: white;
    box-shadow: 0 0 10px rgba(255, 0, 85, 0.4);
  }

  .btn-delete:disabled {
    filter: grayscale(1);
    cursor: not-allowed;
    opacity: 0.5;
  }

  .cell-name {
    display: flex;
    justify-content: center;
    padding: 0 5px;
  }

  .input-ghost {
    background: transparent;
    border: 1px solid transparent;
    color: var(--text-color);
    font-size: 14px;
    padding: 6px;
    width: 100%;
    border-radius: 6px;
    text-align: center;
    transition: all 0.2s;
    font-weight: 500;
    font-family: 'Jua', sans-serif;
  }

  .input-ghost:focus {
    border-color: var(--accent-color);
    background: rgba(0,0,0,0.3);
    outline: none;
    box-shadow: 0 0 5px rgba(217, 70, 239, 0.3);
  }

  .input-ghost:disabled {
    color: var(--text-muted);
    cursor: not-allowed;
  }

  .cell-weight {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    background: rgba(0,0,0,0.3);
    padding: 2px;
    border-radius: 6px;
    width: fit-content;
    margin: 0 auto;
    border: 1px solid rgba(255,255,255,0.05);
  }

  .weight-btn {
    background: transparent;
    color: var(--text-muted);
    border: none;
    width: 20px;
    height: 20px;
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    transition: all 0.2s;
  }

  .weight-btn:hover {
    background: rgba(255,255,255,0.1);
    color: white;
  }

  .weight-btn:disabled {
    cursor: not-allowed;
    opacity: 0.3;
  }

  .input-number {
    text-align: center;
    font-family: 'Jua', sans-serif;
    width: 36px;
    padding: 0;
    background: transparent;
    border: none;
    font-weight: 700;
    color: var(--secondary-accent);
    font-size: 14px;
  }

  .input-number:focus { background: transparent; border: none; }
  .input-number:disabled { color: var(--text-muted); }

  .input-number::-webkit-outer-spin-button,
  .input-number::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }

  .prob-text {
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
    font-family: 'Jua', sans-serif;
  }

  .add-row {
    padding: 10px;
    border-top: 1px solid var(--border-color);
    background: rgba(20, 5, 35, 0.7);
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
  }

  .btn-add {
    width: 100%;
    background: linear-gradient(90deg, #10b981, #059669);
    color: white;
    border: none;
    padding: 10px;
    border-radius: 10px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.2s;
    font-size: 15px;
    box-shadow: 0 4px 10px rgba(16, 185, 129, 0.3);
    font-family: 'Jua', sans-serif;
  }

  .btn-add:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .btn-add:active { transform: translateY(0); }

  .btn-add:disabled {
    background: #4a5568;
    color: #a0aec0;
    box-shadow: none;
    cursor: not-allowed;
    transform: none;
  }

  .export-area {
    margin-top: 20px;
    padding: 12px 16px;
    background: rgba(0, 0, 0, 0.2);
    border-radius: 12px;
    border: 1px solid var(--border-color);
    display: flex;
    gap: 12px;
    align-items: center;
    position: relative;
    z-index: 2;
    backdrop-filter: blur(5px);
  }

  .export-input {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text-muted);
    padding: 8px;
    font-size: 12px;
    font-family: 'Jua', sans-serif;
  }

  .btn-copy {
    background: #333;
    color: white;
    border: 1px solid #555;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    transition: all 0.2s;
    font-family: 'Jua', sans-serif;
  }

  .btn-copy:hover { background: #555; border-color: #777; }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    backdrop-filter: blur(8px);
  }

  .modal {
    background: linear-gradient(135deg, #2e1065, #0f0219);
    padding: 30px;
    border-radius: 24px;
    text-align: center;
    box-shadow: 0 0 50px rgba(217, 70, 239, 0.5);
    border: 2px solid var(--accent-color);
    min-width: 500px;
    max-height: 85vh;
    display: flex;
    flex-direction: column;
    transform: scale(0.9);
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .modal.show {
    transform: scale(1);
    opacity: 1;
  }

  .modal h2 {
    color: var(--secondary-accent);
    font-size: 1.5rem;
    margin: 0 0 10px 0;
    text-transform: uppercase;
    letter-spacing: 2px;
    text-shadow: 0 0 10px rgba(34, 211, 238, 0.8);
  }

  .winner-text {
    font-size: 3.5rem;
    font-weight: 900;
    color: #ffff00;
    text-shadow: 0 0 20px rgba(255, 255, 0, 0.8), 0 0 40px rgba(255, 255, 0, 0.4);
    margin-bottom: 20px;
  }

  .modal-stats-label {
    color: var(--text-muted);
    font-size: 14px;
    margin-top: 10px;
    margin-bottom: 8px;
    text-align: left;
    width: 100%;
    font-weight: 700;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    padding-bottom: 5px;
  }

  .modal-stats-list {
    flex: 1;
    overflow-y: auto;
    width: 100%;
    background: rgba(0,0,0,0.2);
    border-radius: 8px;
    padding: 10px;
    margin-bottom: 10px;
    text-align: left;
  }

  .modal-stats-list::-webkit-scrollbar { width: 6px; }
  .modal-stats-list::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }

  .stat-row {
    display: flex;
    justify-content: space-between;
    padding: 8px 10px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    font-size: 15px;
    color: #e2e8f0;
  }

  .stat-row:last-child { border-bottom: none; }

  .stat-row.is-winner {
    background: rgba(255, 255, 0, 0.15);
    color: #ffff00;
    font-weight: bold;
    border-radius: 6px;
    border: 1px solid rgba(255, 255, 0, 0.3);
  }

  .modal-hint {
    color: var(--text-muted);
    margin-top: 10px;
    font-size: 0.9rem;
  }

  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #4c1d95;
    color: #fff;
    padding: 12px 24px;
    border-radius: 30px;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 2000;
    box-shadow: 0 0 20px rgba(139, 92, 246, 0.5);
    font-weight: 600;
    border: 1px solid var(--accent-color);
  }

  .toast.visible {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  @media (max-width: 900px) {
    .app-container { grid-template-columns: 1fr; height: auto; min-height: 100vh; overflow-y: auto; }
    .roulette-section { border-right: none; border-bottom: 1px solid var(--border-color); height: auto; padding-bottom: 40px; overflow: visible; }
    .controls-section { height: auto; overflow: visible; }
    .wheel-container { width: 300px; height: 300px; max-width: none; max-height: none; }
    .calc-container { margin-top: 20px; }
    .mascot-img { height: 40vh; }
  }
</style>
</head>
<body>

<div class="app-container">
  <section class="roulette-section">
    <div class="wheel-container">
      <div class="wheel-ring"></div>
      <div class="wheel-rotator" id="wheelRotator">
        <div class="wheel" id="wheelCanvas"></div>
        <div class="wheel-labels" id="wheelLabels"></div>
      </div>

      <div class="wheel-center"></div>

      <svg class="pointer" viewBox="0 0 40 50">
        <path d="M20 50 C20 50 40 30 40 18 C40 8 31 0 20 0 C9 0 0 8 0 18 C0 30 20 50 20 50 Z"
              fill="#ffe0f7" stroke="#d946ef" stroke-width="2"/>
      </svg>
    </div>

    <div class="result-display">
      <div class="result-label">당첨 결과</div>
      <div class="result-value" id="currentResult">-</div>
    </div>

    <div class="calc-container">
      <div class="calc-header">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path>
        </svg>
        투네이션 스택 계산기
      </div>
      <div class="calc-input-group">
        <input type="number" id="calcInput" placeholder="0" inputmode="numeric" />
        <span>원</span>
      </div>
      <div class="calc-arrow">
        +20% (수수료 포함)
      </div>
      <div class="calc-result-box">
        <div>
          <span class="calc-stack" id="calcStackResult">0</span>
          <span class="calc-stack-label">스택</span>
        </div>
        <span class="calc-sub-text">
          충전 금액: <span id="calcTotalMoney" class="calc-highlight">0</span>원
        </span>
      </div>
    </div>
  </section>

  <section class="controls-section">
    <img id="mascot" class="mascot-img" src="https://raw.githubusercontent.com/heyrichoi/ingi/main/2-removebg-preview.png" alt="Mascot">

    <div class="controls-header">
      <div class="timer-container">
        <img src="https://i.imgur.com/xRWsMAj.png" alt="Logo" class="header-logo-inline" />

        <div class="quick-timer-group">
          <button class="btn-quick" onclick="setTimer(60)">1분</button>
          <button class="btn-quick" onclick="setTimer(120)">2분</button>
          <button class="btn-quick" onclick="setTimer(180)">3분</button>
        </div>

        <button class="btn-quick" id="timerToggleBtn">멈춤</button>

        <div class="timer-box">
          <div class="timer-label">자동 타이머</div>
          <div class="timer-display" id="timerDisplay">02:00</div>
          <input type="number" class="timer-edit-input" id="timerInput" value="120" />
        </div>
      </div>

      <button class="spin-btn" id="spinBtn">돌려돌려 돌림판!</button>
    </div>

    <div class="data-table-container">
      <div class="table-header">
        <div>삭제</div>
        <div>이름</div>
        <div>스택</div>
        <div>확률</div>
      </div>
      <div class="table-body" id="tableBody"></div>

      <div class="add-row">
        <button class="btn-add" id="btnAddItem">
          <span>+</span> 항목 추가
        </button>
      </div>
    </div>

    <div class="export-area">
      <div style="font-size:12px; color:var(--text-muted); white-space:nowrap;">내보내기:</div>
      <input type="text" class="export-input" id="exportStr" readonly placeholder="이름*크기, 이름*크기..." />
      <button class="btn-copy" id="btnCopy">복사</button>
    </div>
  </section>
</div>

<div class="overlay" id="modalOverlay">
  <div class="modal" id="winnerModal">
    <h2>🎉 당첨! 🎉</h2>
    <div class="winner-text" id="winnerText">NAME</div>

    <div class="modal-stats-label">전체 항목 현황</div>
    <div class="modal-stats-list" id="modalStatsList"></div>

    <div class="modal-hint">화면을 클릭하여 닫기</div>
  </div>
</div>

<div class="toast" id="toast">복사되었습니다</div>

<script>
const state = {
  items: [
    { id: 1, name: '항목 1', weight: 1 },
    { id: 2, name: '항목 2', weight: 1 },
    { id: 3, name: '항목 3', weight: 1 },
  ],
  isSpinning: false,
  spinPhase: 'idle',
  rotation: 0,
  timerSeconds: 120,
  defaultTimer: 120,
  timerInterval: null,
  timerPaused: false
};

const colors = [
  '#f43f5e', '#d946ef', '#8b5cf6', '#6366f1', '#3b82f6',
  '#0ea5e9', '#06b6d4', '#14b8a6', '#10b981', '#84cc16',
  '#eab308', '#f59e0b', '#f97316'
];

const MASCOT_IDLE = 'https://raw.githubusercontent.com/heyrichoi/ingi/main/2-removebg-preview.png';
const MASCOT_ACTIVE = 'https://raw.githubusercontent.com/heyrichoi/ingi/main/1-removebg-preview.png';

const wheelCanvas = document.getElementById('wheelCanvas');
const wheelLabels = document.getElementById('wheelLabels');
const wheelRotator = document.getElementById('wheelRotator');
const tableBody = document.getElementById('tableBody');
const btnAddItem = document.getElementById('btnAddItem');
const spinBtn = document.getElementById('spinBtn');
const currentResult = document.getElementById('currentResult');
const exportStr = document.getElementById('exportStr');
const btnCopy = document.getElementById('btnCopy');
const timerDisplay = document.getElementById('timerDisplay');
const timerInput = document.getElementById('timerInput');
const timerToggleBtn = document.getElementById('timerToggleBtn');
const modalOverlay = document.getElementById('modalOverlay');
const winnerModal = document.getElementById('winnerModal');
const winnerText = document.getElementById('winnerText');
const modalStatsList = document.getElementById('modalStatsList');
const toast = document.getElementById('toast');
const calcInput = document.getElementById('calcInput');
const calcStackResult = document.getElementById('calcStackResult');
const calcTotalMoney = document.getElementById('calcTotalMoney');
const mascotImg = document.getElementById('mascot');

calcInput.addEventListener('input', (e) => {
  const val = parseInt(e.target.value, 10);
  if (isNaN(val) || val < 0) {
    calcStackResult.textContent = '0';
    calcTotalMoney.textContent = '0';
    return;
  }

  const totalMoney = val * 1.2;
  const stacks = totalMoney / 1000;
  const formattedStacks = Number.isInteger(stacks) ? stacks : stacks.toFixed(1);

  calcStackResult.textContent = formattedStacks;
  calcTotalMoney.textContent = Math.floor(totalMoney).toLocaleString();
});

function runTimerInterval() {
  clearInterval(state.timerInterval);

  state.timerInterval = setInterval(() => {
    if (state.timerPaused) return;

    if (state.timerSeconds > 0) {
      state.timerSeconds--;
      updateTimerDisplay();
    } else {
      clearInterval(state.timerInterval);
      state.timerInterval = null;
      state.timerPaused = false;
      updateTimerToggleButton();
      updateTimerDisplay();
    }
  }, 1000);
}

function startTimer() {
  clearInterval(state.timerInterval);
  state.timerSeconds = state.defaultTimer;
  state.timerPaused = false;
  updateTimerDisplay();
  updateTimerToggleButton();
  runTimerInterval();
}

function keepPausedTimerState() {
  clearInterval(state.timerInterval);
  state.timerInterval = null;
  state.timerPaused = true;
  updateTimerDisplay();
  updateTimerToggleButton();
}

function restartTimerIfNeeded() {
  if (state.timerPaused) {
    keepPausedTimerState();
  } else {
    startTimer();
  }
}

function pauseTimer() {
  state.timerPaused = true;
  clearInterval(state.timerInterval);
  state.timerInterval = null;
  updateTimerDisplay();
  updateTimerToggleButton();
}

function resumeTimer() {
  if (state.timerSeconds <= 0) return;
  state.timerPaused = false;
  updateTimerDisplay();
  updateTimerToggleButton();
  runTimerInterval();
}

function toggleTimer() {
  if (state.timerPaused) {
    resumeTimer();
  } else {
    pauseTimer();
  }
}

function updateTimerToggleButton() {
  timerToggleBtn.textContent = state.timerPaused ? '재개' : '멈춤';
  timerToggleBtn.classList.toggle('paused', state.timerPaused);
}

function updateTimerDisplay() {
  const m = Math.floor(state.timerSeconds / 60).toString().padStart(2, '0');
  const s = (state.timerSeconds % 60).toString().padStart(2, '0');
  timerDisplay.textContent = `${m}:${s}`;

  if (state.timerSeconds <= 10 && state.timerSeconds > 0 && !state.timerPaused) {
    timerDisplay.classList.add('urgent');
  } else {
    timerDisplay.classList.remove('urgent');
  }

  timerDisplay.classList.toggle('paused', state.timerPaused);
}

function setTimer(seconds) {
  state.defaultTimer = seconds;
  state.timerSeconds = seconds;

  if (state.timerPaused) {
    keepPausedTimerState();
  } else {
    startTimer();
  }
}
window.setTimer = setTimer;

timerDisplay.addEventListener('click', () => {
  timerInput.style.display = 'block';
  timerDisplay.style.display = 'none';
  timerInput.value = state.defaultTimer;
  timerInput.focus();
});

timerInput.addEventListener('blur', finishTimerEdit);
timerInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') finishTimerEdit();
});

timerToggleBtn.addEventListener('click', toggleTimer);

function finishTimerEdit() {
  let val = parseInt(timerInput.value, 10);
  if (isNaN(val) || val < 1) val = 60;

  state.defaultTimer = val;
  state.timerSeconds = val;

  timerInput.style.display = 'none';
  timerDisplay.style.display = 'block';

  if (state.timerPaused) {
    keepPausedTimerState();
  } else {
    startTimer();
  }
}

function addItem() {
  if (state.isSpinning) return;
  const id = Date.now();
  const nextNum = state.items.length + 1;
  state.items.push({ id, name: `항목 ${nextNum}`, weight: 1 });
  renderTable();
  renderWheel();
  restartTimerIfNeeded();
  showEditingMascot();
}

function deleteItem(id) {
  if (state.isSpinning) return;
  state.items = state.items.filter(item => item.id !== id);
  if (state.items.length === 0) {
    state.items.push({ id: Date.now(), name: '항목 1', weight: 1 });
  }
  renderTable();
  renderWheel();
  restartTimerIfNeeded();
  showEditingMascot();
}

function updateItem(id, field, value) {
  if (state.isSpinning) return;
  const item = state.items.find(i => i.id === id);

  if (item) {
    if (field === 'weight') {
      let w = parseInt(value, 10);
      if (isNaN(w) || w < 0) w = 0;
      item.weight = w;
      renderTable();
    } else {
      item.name = value;
      updateExportStr();
    }

    renderWheel();
    restartTimerIfNeeded();
    showEditingMascot();
  }
}

function changeWeight(id, delta) {
  if (state.isSpinning) return;
  const item = state.items.find(i => i.id === id);

  if (item) {
    let newW = item.weight + delta;
    if (newW < 0) newW = 0;
    item.weight = newW;
    renderTable();
    renderWheel();
    restartTimerIfNeeded();
    showEditingMascot();
  }
}

function getTotalWeight() {
  return state.items.reduce((sum, item) => sum + item.weight, 0);
}

function updateExportStr() {
  const validItems = state.items.filter(i => i.name.trim() !== '' && i.weight > 0);
  exportStr.value = validItems.map(i => `${i.name}*${i.weight}`).join(',');
}

function renderTable() {
  tableBody.innerHTML = '';
  const total = getTotalWeight();
  const disabledAttr = state.isSpinning ? 'disabled' : '';

  updateExportStr();

  state.items.forEach(item => {
    const row = document.createElement('div');
    row.className = 'table-row';
    const percent = total > 0 ? ((item.weight / total) * 100).toFixed(1) : '0.0';

    row.innerHTML = `
      <div class="cell-action">
        <button class="btn-delete" onclick="deleteItem(${item.id})" ${disabledAttr}>✕</button>
      </div>
      <div class="cell-name">
        <input
          type="text"
          class="input-ghost"
          value="${item.name}"
          placeholder="이름 입력"
          oninput="updateItem(${item.id}, 'name', this.value)"
          ${disabledAttr}
        />
      </div>
      <div class="cell-weight">
        <button class="weight-btn" onclick="changeWeight(${item.id}, -1)" ${disabledAttr}>◀</button>
        <input
          type="number"
          class="input-ghost input-number"
          value="${item.weight}"
          min="0"
          onchange="updateItem(${item.id}, 'weight', this.value)"
          ${disabledAttr}
        />
        <button class="weight-btn" onclick="changeWeight(${item.id}, 1)" ${disabledAttr}>▶</button>
      </div>
      <div class="prob-text">${percent}%</div>
    `;
    tableBody.appendChild(row);
  });

  btnAddItem.disabled = state.isSpinning;
}

function renderWheel() {
  const total = getTotalWeight();
  let accumulatedDeg = 0;

  wheelCanvas.innerHTML = '';
  wheelLabels.innerHTML = '';

  if (total === 0) {
    wheelCanvas.style.background = '#333';
    return;
  }

  let gradientStr = 'conic-gradient(';
  const assignedColors = [];

  state.items.forEach((item, index) => {
    let colorIndex = index % colors.length;
    let selectedColor = colors[colorIndex];

    if (index > 0 && selectedColor === assignedColors[index - 1]) {
      colorIndex = (colorIndex + 1) % colors.length;
      selectedColor = colors[colorIndex];
    }

    if (index === state.items.length - 1 && state.items.length > 1) {
      const firstColor = assignedColors[0];
      while (selectedColor === assignedColors[index - 1] || selectedColor === firstColor) {
        colorIndex = (colorIndex + 1) % colors.length;
        selectedColor = colors[colorIndex];
      }
    }

    assignedColors.push(selectedColor);

    const deg = (item.weight / total) * 360;
    const startDeg = accumulatedDeg;
    const endDeg = accumulatedDeg + deg;

    gradientStr += `${selectedColor} ${startDeg}deg ${endDeg}deg,`;

    if (deg > 5 && item.name) {
      const labelDiv = document.createElement('div');
      labelDiv.className = 'slice-label';
      const midDeg = startDeg + (deg / 2);
      labelDiv.style.transform = `rotate(${midDeg - 90}deg)`;
      labelDiv.innerHTML = `<span>${item.name}</span>`;
      wheelLabels.appendChild(labelDiv);
    }

    accumulatedDeg += deg;
  });

  gradientStr = gradientStr.slice(0, -1) + ')';
  wheelCanvas.style.background = gradientStr;
}

function setMascotSafe(src) {
  if (mascotImg.dataset.currentSrc === src) return;
  mascotImg.src = src;
  mascotImg.dataset.currentSrc = src;
}

function updateMascot() {
  if (state.isSpinning) {
    setMascotSafe(MASCOT_ACTIVE);
  } else {
    setMascotSafe(MASCOT_IDLE);
  }
}

let editingMascotTimeout = null;

function showEditingMascot() {
  if (state.isSpinning) return;

  setMascotSafe(MASCOT_ACTIVE);
  clearTimeout(editingMascotTimeout);

  editingMascotTimeout = setTimeout(() => {
    if (!state.isSpinning) {
      setMascotSafe(MASCOT_IDLE);
    }
  }, 500);
}

mascotImg.addEventListener('error', () => {
  mascotImg.style.display = 'none';
});

spinBtn.addEventListener('click', () => {
  if (state.spinPhase === 'idle') {
    const total = getTotalWeight();
    if (total <= 0) {
      showToast('룰렛 항목을 추가해주세요 (크기 > 0)');
      return;
    }

    state.spinPhase = 'spinning';
    state.isSpinning = true;
    updateMascot();
    renderTable();

    spinBtn.textContent = '멈추기!';
    spinBtn.classList.add('stop-mode');
    currentResult.textContent = '...';

    wheelRotator.style.transition = 'none';
    wheelRotator.classList.add('spinning');
  } else if (state.spinPhase === 'spinning') {
    state.spinPhase = 'stopping';

    const computedStyle = window.getComputedStyle(wheelRotator);
    const transform = computedStyle.transform;

    let currentRotation = 0;
    if (transform && transform !== 'none') {
      const matrix = new DOMMatrix(transform);
      currentRotation = Math.round(Math.atan2(matrix.b, matrix.a) * (180 / Math.PI));
      if (currentRotation < 0) currentRotation += 360;
    }

    state.rotation = currentRotation;

    wheelRotator.classList.remove('spinning');
    wheelRotator.style.transform = `rotate(${state.rotation}deg)`;

    spinBtn.disabled = true;

    const total = getTotalWeight();
    let random = Math.random() * total;
    let winner = null;
    let currentWeight = 0;
    let winnerIndex = 0;

    for (let i = 0; i < state.items.length; i++) {
      currentWeight += state.items[i].weight;
      if (random <= currentWeight) {
        winner = state.items[i];
        winnerIndex = i;
        break;
      }
    }

    let prevWeight = 0;
    for (let j = 0; j < winnerIndex; j++) prevWeight += state.items[j].weight;

    const startAngle = (prevWeight / total) * 360;
    const sliceAngle = (winner.weight / total) * 360;
    const winnerCenterAngle = startAngle + (sliceAngle / 2);

    const currentRotMod = state.rotation % 360;
    const targetRotMod = (360 - winnerCenterAngle);

    let diff = targetRotMod - currentRotMod;
    if (diff < 0) diff += 360;

    const extraSpins = 360 * 15;
    const finalRotation = state.rotation + diff + extraSpins;
    const fuzz = (Math.random() - 0.5) * (sliceAngle * 0.8);
    state.rotation = finalRotation + fuzz;

    void wheelRotator.offsetWidth;

    wheelRotator.style.transition = 'transform 7s cubic-bezier(0.1, 1, 0.1, 1)';
    wheelRotator.style.transform = `rotate(${state.rotation}deg)`;

    setTimeout(() => {
      state.isSpinning = false;
      state.spinPhase = 'idle';
      updateMascot();
      renderTable();

      spinBtn.disabled = false;
      spinBtn.textContent = '돌려돌려 돌림판!';
      spinBtn.classList.remove('stop-mode');

      const probability = ((winner.weight / total) * 100).toFixed(1);

      currentResult.innerHTML = `
        ${winner.name}
        <div class="result-detail">
          ${winner.weight}스택 / ${probability}%
        </div>
      `;

      winnerText.textContent = winner.name;

      modalStatsList.innerHTML = '';
      state.items.forEach(item => {
        const p = ((item.weight / total) * 100).toFixed(1);
        const isWinner = item.id === winner.id;

        const row = document.createElement('div');
        row.className = `stat-row ${isWinner ? 'is-winner' : ''}`;
        row.innerHTML = `
          <span>${item.name}</span>
          <span>${item.weight}스택 (${p}%)</span>
        `;
        modalStatsList.appendChild(row);
      });

      modalOverlay.style.display = 'flex';
      void winnerModal.offsetWidth;
      winnerModal.classList.add('show');
    }, 7100);
  }
});

modalOverlay.addEventListener('click', () => {
  winnerModal.classList.remove('show');
  setTimeout(() => {
    modalOverlay.style.display = 'none';
  }, 300);
});

btnCopy.addEventListener('click', () => {
  exportStr.select();
  document.execCommand('copy');
  showToast('텍스트가 복사되었습니다!');
});

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('visible');
  setTimeout(() => toast.classList.remove('visible'), 2000);
}

window.deleteItem = deleteItem;
window.updateItem = updateItem;
window.changeWeight = changeWeight;

btnAddItem.addEventListener('click', addItem);

renderTable();
renderWheel();
startTimer();
updateMascot();
</script>
</body>
</html>
